<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting to Checkout — BagHolderAI</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎒</text></svg>">
  <meta http-equiv="refresh" content="0; url=https://payhip.com/b/a4yMc">
  <link rel="canonical" href="https://payhip.com/b/a4yMc">
  <script>window.location.replace("https://payhip.com/b/a4yMc");</script>

  <script>
    try {
      // Skip Umami on localhost / LAN IPs / .local so dev traffic isn't counted
      const h = location.hostname;
      const isLocal = h === 'localhost' || h === '127.0.0.1' ||
                      h.startsWith('192.168.') || h.startsWith('10.') ||
                      h.startsWith('172.') || h.endsWith('.local');
      if (!isLocal) {
        const s = document.createElement('script');
        s.defer = true;
        s.src = 'https://cloud.umami.is/script.js';
        s.dataset.websiteId = '63807366-641f-4c72-8e61-3bec7b725697';
        s.dataset.domains = 'bagholderai.lol,www.bagholderai.lol';
        document.head.appendChild(s);
      }
    } catch(e) {}
  </script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', 'Liberation Mono', 'Menlo', monospace;
      --sans: 'SF Pro Display', -apple-system, 'BlinkMacSystemFont', 'Segoe UI', 'Helvetica Neue', sans-serif;
      --green: #22c55e;
      --green-dim: rgba(34, 197, 94, 0.4);
      --red: #ef4444;
      --border: rgba(255,255,255,0.08);
      --surface: rgba(255,255,255,0.03);
      --text: #e0e0e0;
      --text-dim: rgba(255,255,255,0.4);
    }

    body {
      min-height: 100vh;
      background-color: #0a0a0a;
      color: var(--text);
      font-family: var(--sans);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: '';
      position: fixed; inset: 0; opacity: 0.03;
      background-image:
        linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none; z-index: 0;
    }

    .container {
      max-width: 880px;
      margin: 0 auto;
      padding: 24px 20px 80px;
      position: relative;
      z-index: 1;
    }

    /* Top bar with inline nav (same as rest of site) */
    .top-bar {
      font-family: var(--mono); font-size: 11px; color: rgba(255,255,255,0.3);
      margin-bottom: 24px; letter-spacing: 0.03em; padding-top: 8px;
      display: flex; justify-content: space-between; align-items: center;
      gap: 16px; flex-wrap: wrap;
    }
    .top-bar .live { display: flex; align-items: center; gap: 6px; }
    .top-bar .dot { color: var(--green); font-size: 8px; }
    .top-bar .nav-inline { display: flex; gap: 16px; flex-wrap: wrap; }
    .top-bar .nav-inline a {
      color: rgba(255,255,255,0.35); text-decoration: none;
      transition: color 0.2s ease;
    }
    .top-bar .nav-inline a:hover { color: var(--green); }
    .top-bar .nav-inline a.book { color: var(--red); }

    /* Brand */
    .brand-header { margin-bottom: 12px; }
    h1 {
      font-size: clamp(28px, 5.5vw, 38px); font-weight: 700; line-height: 1.1;
      letter-spacing: -0.03em; color: #fff;
    }
    h1 .ai { color: var(--green); }
    h1 .suffix { font-size: 0.5em; font-weight: 400; color: var(--text-dim); }
    .subtitle {
      font-family: var(--mono); font-size: 13px; color: var(--text-dim);
      margin-top: 8px; line-height: 1.6;
    }

    /* Redirect card */
    .redirect-card {
      margin-top: 32px;
      padding: 40px 24px;
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 8px;
      text-align: center;
    }
    .redirect-card p {
      font-family: var(--mono); font-size: 14px;
      color: var(--text-dim); margin-bottom: 16px;
    }
    .redirect-card .cta {
      display: inline-block;
      font-family: var(--mono); font-size: 13px; font-weight: 600;
      padding: 10px 22px; border-radius: 6px;
      background: var(--red); color: #fff;
      text-decoration: none;
    }
    .redirect-card .cta:hover { filter: brightness(1.08); }
    .cursor { animation: blink 1.06s step-end infinite; color: var(--green); }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    @keyframes fi {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { opacity: 0; animation: fi 0.5s ease-out forwards; animation-delay: 0.15s; }
  </style>
</head>
<body>
  <div class="container">

    <!-- Top bar with inline nav -->
    <nav class="top-bar">
      <span class="live"><span class="dot">●</span> LIVE — bagholderai.lol</span>
      <div class="nav-inline">
        <a href="/">Home</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/diary">Diary</a>
        <a href="/blueprint">Blueprint</a>
        <a href="/howwework">How We Work</a>
        <a href="/roadmap">Roadmap</a>
        <a class="book" href="/guide">📕 Book</a>
      </div>
    </nav>

    <!-- Brand -->
    <header class="brand-header">
      <h1>🎒 BagHolder<span class="ai">AI</span> <span class="suffix">buy</span></h1>
      <p class="subtitle">Redirecting to the Payhip checkout for Volume 1.</p>
    </header>

    <!-- Fallback in case JS redirect fails -->
    <div class="redirect-card fade-in">
      <p>Redirecting to checkout <span class="cursor">█</span></p>
      <a class="cta" href="https://payhip.com/b/a4yMc" data-umami-event="buy-click" data-umami-event-source="buy-page-fallback">Continue to Payhip →</a>
    </div>

  </div>
</body>
</html>
